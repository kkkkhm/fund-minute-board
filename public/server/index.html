<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>基金服务端分钟看板</title>
    <link rel="stylesheet" href="/styles.css?v=curve-60">
    <link rel="stylesheet" href="/server/server.css?v=curve-60-keep">
  </head>
  <body>
    <main class="board server-board">
      <header class="masthead">
        <div>
          <p class="eyebrow">服务端采集</p>
          <h1>分钟看板</h1>
        </div>
        <div class="live-panel" aria-live="polite">
          <span id="live-dot" class="live-dot"></span>
          <div>
            <strong id="connection-label">启动后台采集</strong>
            <p id="clock-label">等待服务端第一批数据</p>
          </div>
        </div>
      </header>

      <section class="summary-band" aria-label="市场摘要">
        <div id="market-summary" class="market-summary"></div>
        <div class="metric-strip">
          <article>
            <p>基金数</p>
            <strong id="fund-total">--</strong>
          </article>
          <article>
            <p>上涨</p>
            <strong id="up-total">--</strong>
          </article>
          <article>
            <p>下跌</p>
            <strong id="down-total">--</strong>
          </article>
          <article>
            <p>服务端采样</p>
            <strong id="sample-count">--</strong>
          </article>
        </div>
      </section>

      <section class="workspace" aria-label="服务端曲线工作区">
        <section class="curve-pane">
          <div class="pane-head">
            <div>
              <p class="eyebrow">服务端当日曲线</p>
              <h2 id="selected-name">等待数据</h2>
            </div>
            <div id="selected-change" class="change-pill">--</div>
          </div>
          <div class="chart-shell">
            <canvas id="curve" aria-label="服务端采集涨跌曲线"></canvas>
            <p id="chart-empty" class="chart-empty">后台每分钟采样后，这里会绘出当日曲线。</p>
          </div>
          <div id="chart-meta" class="chart-meta"></div>
        </section>

        <section class="table-pane">
          <div class="table-toolbar">
            <label class="search-field">
              <span>筛选</span>
              <input id="curve-filter" type="search" placeholder="输入基金或指标名称" autocomplete="off">
            </label>
            <label class="sort-field">
              <span>排序</span>
              <select id="curve-sort">
                <option value="change-desc">涨幅高</option>
                <option value="change-asc">涨幅低</option>
                <option value="name">名称</option>
              </select>
            </label>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>曲线</th>
                  <th>时段</th>
                  <th>涨跌</th>
                </tr>
              </thead>
              <tbody id="curve-rows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/server/server-app.js"></script>
  </body>
</html>
